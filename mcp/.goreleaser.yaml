version: 2

# Packages the mcp/ submodule (github.com/vkatrichenko/wireguard-vpn/mcp) as
# public, multi-platform GitHub Release binaries. Triggered by mcp/vX.Y.Z tags
# (see ../.github/workflows/mcp-release.yml) — the mcp/ prefix on the tag is
# also what `go install .../mcp/cmd/mcp-server@mcp/vX.Y.Z` requires for a
# Go module that lives in a repo subdirectory (see GoReleaser's
# customization/monorepo "a note about gomods and prefixed tags").
#
# NOTE ON MONOREPO SUPPORT AND FILE LOCATION: GoReleaser's own `monorepo:`
# config block (which would let a root-level config natively parse
# `mcp/v1.2.3`-shaped tags and scope a build to a subdirectory) is a
# GoReleaser PRO-only feature — confirmed via GoReleaser's docs
# (resources/limitations/semver: "tags prefixed with component names...
# available exclusively in GoReleaser Pro"). This project does not hold a Pro
# license, so:
#   1. This file lives at mcp/.goreleaser.yaml, not the repo root, and CI
#      runs GoReleaser with mcp/ as its working directory (goreleaser-action's
#      `workdir` input). That makes `main`/`binary` below resolve against
#      mcp/'s own go.mod/go.sum with no special config — the same as running
#      any single-module goreleaser build, just cwd'd into the submodule.
#      (A `gomod.dir` field exists but only locates the go.mod for module-path
#      metadata; it does NOT change where `go build` runs from or make `main`
#      resolve relative to it — verified empirically via a snapshot build that
#      failed with "cannot find main module" until the config moved here.)
#   2. GoReleaser's git operations (tag detection) are always repo-root-based
#      regardless of cwd, and can't parse a `/`-containing tag as semver
#      without Pro. The workflow works around this by exporting
#      GORELEASER_CURRENT_TAG with the `mcp/` prefix stripped (so
#      `.Version`/`.Tag` parse as valid semver for ldflags, archive names,
#      and checksums). BUT GoReleaser's release-mode `validate` step then
#      requires a real git tag literally named `v0.1.0` (etc.) at HEAD to
#      exist — which it never does, since the actual tag is `mcp/v0.1.0` —
#      so `release --clean` always failed with "git tag v0.1.0 was not made
#      against commit ...". Publishing a GitHub Release against the stripped
#      tag isn't an option either: it would auto-create a plain `vX.Y.Z` tag,
#      colliding with dashboard-release.yml's `v*.*.*` namespace and NOT
#      being the `mcp/vX.Y.Z` ref `go install` needs.
#
#      The fix: `release.disable` below means GoReleaser NEVER publishes a
#      GitHub Release at all — it only builds, archives, checksums, and
#      signs. mcp-release.yml runs GoReleaser with `--skip=validate` (safe,
#      since nothing here depends on the validate step once publish is
#      disabled) and then publishes the actual GitHub Release itself via
#      `gh release create "${GITHUB_REF_NAME}" ...`, which attaches to the
#      real, literal `mcp/vX.Y.Z` tag exactly like dashboard-release.yml does
#      for its own `vX.Y.Z` tags. This also means the release never collides
#      with the plain `vX.Y.Z` tags dashboard-release.yml already owns in
#      this repo.
project_name: wireguard-mcp

# Changelog diffing between tags is disabled: with the prefix-stripping
# workaround above, GoReleaser has no reliable way (without Pro) to find the
# correct "previous mcp/ tag" among a shared tag namespace that also holds
# the dashboard's plain vX.Y.Z tags. GitHub's release body is asset-only;
# revisit if/when this graduates to GoReleaser Pro.
changelog:
  disable: true

builds:
  - id: wireguard-mcp
    main: ./cmd/mcp-server
    binary: wireguard-mcp
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: wireguard-mcp
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# GoReleaser never publishes a GitHub Release itself — see the header comment
# above. mcp-release.yml runs `release --clean --skip=validate` purely to get
# GoReleaser's build/archive/checksum/sign pipeline, then publishes the real
# release via `gh release create` against the literal `mcp/vX.Y.Z` tag.
release:
  disable: true

# Keyless (OIDC) cosign signing of the checksum file, which transitively
# covers every archive since checksums.txt hashes them all. Requires
# `id-token: write` (workflow permission) and cosign installed on the runner
# (sigstore/cosign-installer in mcp-release.yml). Not exercised by
# `--snapshot` builds (goreleaser skips signing in snapshot mode) or by a
# local `goreleaser check` — only a real tagged CI run signs for real.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    env:
      - COSIGN_YES=true
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true
