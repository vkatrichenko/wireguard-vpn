# mcp-release
#
# THIS IS THE REPO'S FIRST NON-DASHBOARD CI WORKFLOW AND ITS FIRST USE OF ANY
# THIRD-PARTY RELEASE TOOLING (GoReleaser, cosign). It requires explicit owner
# sign-off before merging to main. It does not touch Terraform, does not
# apply any infrastructure, and does not deploy anything to the EC2 host —
# it only builds and publishes the mcp/ submodule's stdio MCP server binary
# as a public, laptop-side GitHub Release artifact (see mcp/README.md's
# Installation section). Release-only, same trigger philosophy as
# dashboard-release.yml: a tag push is a deliberate, human-reviewed choice.
#
# Trigger semantics:
#   - Tags matching `mcp/v*` only (e.g. `mcp/v0.1.0`). This mirrors Go's own
#     module-in-subdirectory tagging convention (a module at mcp/ must be
#     tagged mcp/vX.Y.Z for `go install .../mcp/cmd/mcp-server@mcp/vX.Y.Z`
#     to resolve), and keeps this tag namespace disjoint from
#     dashboard-release.yml's plain `v*.*.*` tags in the same repo.
#   - No workflow_dispatch, for the same reason dashboard-release.yml has
#     none: a manual run has no tag ref to derive a version from.
#
# GoReleaser Pro vs OSS: this repo has no GoReleaser Pro license, so
# mcp/.goreleaser.yaml deliberately avoids the Pro-only `monorepo:` config
# block (confirmed Pro-only via GoReleaser's own docs). Instead:
#   - goreleaser-action's `workdir: mcp` input runs GoReleaser with mcp/ as
#     its working directory, so mcp/.goreleaser.yaml's `main`/`binary`
#     resolve against the submodule's own go.mod with no extra config.
#   - GORELEASER_CURRENT_TAG is exported below with the `mcp/` prefix
#     stripped, because GoReleaser's git-tag parsing (still repo-root-based
#     regardless of workdir) can't treat a `/`-containing tag as semver
#     without Pro.
#
# BUILD vs PUBLISH split (fixes a real failure on tag `mcp/v0.0.1`): GoReleaser's
# `release` mode validates that a git tag literally named the stripped version
# (e.g. `v0.0.1`) was made against HEAD — which never exists, since the real
# tag is `mcp/v0.0.1` — so `release --clean` always failed with "git tag
# v0.0.1 was not made against commit ...". Publishing against the stripped tag
# instead isn't an option either: GoReleaser would auto-create a plain
# `vX.Y.Z` tag, colliding with dashboard-release.yml's `v*.*.*` namespace and
# NOT being the `mcp/vX.Y.Z` ref `go install .../mcp/cmd/mcp-server@mcp/vX.Y.Z`
# needs. So the two concerns are now split:
#   - GoReleaser (`release --clean --skip=validate`) only builds, archives,
#     checksums, and signs — mcp/.goreleaser.yaml's `release.disable: true`
#     means it never attempts to publish a GitHub Release at all, so
#     `--skip=validate` is safe.
#   - The workflow's own `gh release create "${GITHUB_REF_NAME}" ...` step
#     (below) publishes the actual release against the real, literal
#     `mcp/vX.Y.Z` tag — mirroring dashboard-release.yml's own `gh release
#     create "${GITHUB_REF_NAME}"` pattern — and uploads GoReleaser's
#     dist/ archives, checksums.txt, and cosign signature/cert files as assets.
#
# Auth: GITHUB_TOKEN with `contents: write` to publish the release, plus
# `id-token: write` for cosign's keyless (OIDC) signing of checksums.txt. No
# AWS involvement at all — this binary never touches the EC2 host.

name: mcp-release

on:
  push:
    tags:
      - 'mcp/v*'

permissions:
  contents: write   # required for GoReleaser to publish the GitHub Release
  id-token: write    # required for cosign keyless (OIDC) signing

concurrency:
  # One in-flight run per tag; never cancel a release mid-publish.
  group: mcp-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish mcp-server release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # GoReleaser needs full tag history to compute changelog/previous-tag
          # context even though this config disables the changelog pipe --
          # a shallow clone would also break `git describe` for the fallback
          # tag-detection path GoReleaser runs before GORELEASER_CURRENT_TAG
          # is applied.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: mcp/go.mod
          cache: true
          cache-dependency-path: mcp/go.sum

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin cosign to the latest 2.x. cosign 3.0.0+ makes --new-bundle-format
          # the DEFAULT, which deprecates and IGNORES the --output-signature /
          # --output-certificate flags that goreleaser's `signs` block passes and
          # instead demands --bundle <path>; with none given it fails on
          # `create bundle file: open : no such file or directory`. cosign 2.6.x
          # still honors the sidecar-file flags, so the .goreleaser.yaml `signs`
          # block and the `dist/checksums.txt*` publish glob (which catches the
          # .sig/.pem sidecars) work unchanged. Follow-up: migrate `signs` to
          # `--bundle` and republish a single .bundle artifact to unpin cosign.
          cosign-release: 'v2.6.3'

      - name: Derive stripped version tag for GoReleaser
        # GITHUB_REF_NAME is the real pushed tag, e.g. `mcp/v0.1.0`. Strip the
        # `mcp/` prefix so GoReleaser's semver parser (OSS, no Pro monorepo
        # support) accepts it for .Version/.Tag templating. See the header
        # comment above and mcp/.goreleaser.yaml for why the release itself
        # still targets the unstripped, real tag.
        run: echo "GORELEASER_CURRENT_TAG=${GITHUB_REF_NAME#mcp/}" >> "$GITHUB_ENV"

      - name: Run GoReleaser (build, archive, checksum, sign — no publish)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        # `--skip=validate` is required because there is no plain-semver git
        # tag (e.g. `v0.0.1`) at HEAD — only the real `mcp/v0.0.1` — and
        # GoReleaser's release-mode validate step demands one. This is safe
        # because mcp/.goreleaser.yaml sets `release.disable: true`, so
        # GoReleaser never attempts to publish (and therefore never
        # auto-creates a stray plain-semver tag); publishing is handled by
        # the `gh release create` step below instead.
        with:
          workdir: mcp
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        working-directory: mcp
        env:
          GH_TOKEN: ${{ github.token }}
        # GoReleaser only built artifacts into mcp/dist/ (release.disable:
        # true in mcp/.goreleaser.yaml). This step publishes the actual
        # release against the real, literal pushed tag (GITHUB_REF_NAME =
        # `mcp/vX.Y.Z`), mirroring dashboard-release.yml's own `gh release
        # create "${GITHUB_REF_NAME}"` pattern. Asset globs:
        #   dist/*.tar.gz, dist/*.zip  — per-platform archives (archives.formats
        #                                 / format_overrides in the config)
        #   dist/checksums.txt         — checksum.name_template
        #   dist/checksums.txt.sig     — cosign sign-blob --output-signature
        #   dist/checksums.txt.pem     — cosign sign-blob --output-certificate
        # The trailing `checksums.txt*` glob catches the checksum file plus
        # its cosign `.sig`/`.pem` sidecars in one pattern; publishing the
        # signature/cert is required or the signing step is pointless.
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/checksums.txt*
