# dashboard-deploy
#
# Rolls a freshly-built wireguard-dashboard binary onto the WireGuard EC2 host
# by invoking a hard-pinned SSM document over `aws ssm send-command`. The
# document itself (`tf-wireguard-vpn-test-dashboard-deploy`) is provisioned in
# Terraform and is the only place the actual download/install/restart logic
# lives — this workflow just resolves inputs, fires the command, and waits.
#
# Trigger semantics:
#   - workflow_run after `dashboard-build` completes on main. We gate on
#     `conclusion == 'success'` because workflow_run fires for every terminal
#     state (failure, cancelled, ...) — without the guard a red build would
#     still trigger a deploy.
#   - workflow_dispatch for manual re-deploys from the Actions UI, with an
#     `s3_key` override so an operator can roll back to a known-good
#     `main-<older-sha>/wireguard-dashboard` without rebuilding.
#
# OIDC role assumed:
#   arn:aws:iam::831917488702:role/tf-github-actions-dashboard-ci-deploy
# (Trust policy pins `repo:vkatrichenko/wireguard-vpn:ref:refs/heads/main` with
#  StringEquals, so only main can deploy.)
#
# Target instance is looked up at runtime by tag `Name=wireguard-test`. We do
# not hardcode the instance ID because Terraform may replace the EC2 on
# user-data changes — the tag survives the replacement, the instance ID does
# not.
#
# Concurrency: queue, do not cancel. Cancelling a mid-flight SSM command can
# leave the host with a half-replaced binary; safer to serialize deploys.

name: dashboard-deploy

on:
  workflow_run:
    workflows: ["dashboard-build"]   # must match the build workflow's `name:` exactly
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      s3_key:
        description: "S3 key under the artifact bucket (default: latest/wireguard-dashboard)"
        required: false
        default: "latest/wireguard-dashboard"
        type: string

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSM deploy to WireGuard EC2
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required to mint the OIDC token for AWS STS
      contents: read

    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Resolve S3 key
        id: key
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            KEY="${{ inputs.s3_key }}"
          else
            KEY="main-${{ steps.sha.outputs.sha }}/wireguard-dashboard"
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "S3 key: $KEY"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.2
        with:
          role-to-assume: arn:aws:iam::831917488702:role/tf-github-actions-dashboard-ci-deploy
          aws-region: us-east-1

      - name: Look up WireGuard instance
        id: instance
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=wireguard-test" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running WireGuard instance found (tag:Name=wireguard-test)"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Target instance: $INSTANCE_ID"

      - name: Send SSM deploy command
        id: send
        run: |
          set -euo pipefail
          COMMAND_ID=$(aws ssm send-command \
            --document-name "tf-wireguard-vpn-test-dashboard-deploy" \
            --targets "Key=InstanceIds,Values=${{ steps.instance.outputs.instance_id }}" \
            --parameters "s3Key=${{ steps.key.outputs.key }}" \
            --comment "GH Actions deploy for SHA ${{ steps.sha.outputs.sha }}" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Command ID: $COMMAND_ID"

      - name: Wait for SSM command to complete
        run: |
          set -euo pipefail
          aws ssm wait command-executed \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"
          echo "Command finished — checking status..."

      - name: Fetch SSM command output
        if: always()
        run: |
          set -euo pipefail
          aws ssm get-command-invocation \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}" \
            --query "{Status: Status, StatusDetails: StatusDetails, StandardOutputContent: StandardOutputContent, StandardErrorContent: StandardErrorContent}" \
            --output json
